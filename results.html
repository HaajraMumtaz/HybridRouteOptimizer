<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AXIS [LHR] — Route Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#080a0f;
    --surface:rgba(10,13,20,0.88);
    --border:rgba(255,255,255,0.07);
    --border-bright:rgba(255,255,255,0.12);
    --text:#e8eaf0;
    --text-2:rgba(232,234,240,0.55);
    --text-3:rgba(232,234,240,0.28);
    --accent:#00d4ff;
    --accent-dim:rgba(0,212,255,0.08);
    --green:#00e5a0;
    --green-dim:rgba(0,229,160,0.1);
    --amber:#f59e0b;
    --red:#f43f5e;
    --violet:#a78bfa;
    --mono:'IBM Plex Mono',monospace;
    --sans:'Space Grotesk',sans-serif;
    --r:8px;
  }
  html,body{height:100%;background:var(--bg);font-family:var(--sans);color:var(--text);overflow:hidden}

  /* ── VIDEO BG ── */
  #vbg{position:fixed;inset:0;z-index:0}
  #vbg video{width:100%;height:100%;object-fit:cover}
  #vbg::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(8,10,15,.93) 0%,rgba(8,10,15,.75) 55%,rgba(8,10,15,.95) 100%)}
  #vbg::before{content:'';position:absolute;inset:0;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);pointer-events:none}
  .noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px}

  /* ── ENTRY VEIL ── */
  #entry-veil{
    position:fixed;inset:0;z-index:200;
    background:var(--bg);
    opacity:1;
    transition:opacity .6s cubic-bezier(.4,0,.2,1);
    pointer-events:none;
  }
  #entry-veil.gone{opacity:0}

  /* ── HEADER ── */
  #hdr{position:fixed;top:0;left:0;right:0;z-index:30;padding:1.125rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(8,10,15,.7);backdrop-filter:blur(16px)}
  #logo{display:flex;align-items:center;gap:.5rem}
  #logo-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
  #logo-text{font-size:12px;font-weight:600;letter-spacing:.2em}
  #logo-sub{font-family:var(--mono);font-size:7.5px;color:var(--text-3);letter-spacing:.14em;margin-top:2px}
  #hdr-center{font-family:var(--mono);font-size:9px;color:var(--text-3);letter-spacing:.1em;text-align:center;flex:1;padding:0 1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #hdr-center span{color:var(--accent);opacity:.7}
  #hdr-right{display:flex;align-items:center;gap:.75rem}
  #back-link{
    font-family:var(--mono);font-size:9px;color:var(--text-3);
    letter-spacing:.08em;cursor:pointer;
    padding:.3rem .6rem;border:1px solid var(--border);border-radius:5px;
    transition:all .15s;text-decoration:none;
  }
  #back-link:hover{border-color:rgba(0,212,255,.25);color:var(--accent)}
  #clock{font-family:var(--mono);font-size:9px;color:var(--text-3);letter-spacing:.1em}

  /* ── APP SHELL ── */
  #app{position:relative;z-index:10;width:100%;height:100vh;display:flex;padding-top:52px}

  /* ── MAP PANE ── */
  #map-pane{flex:1;position:relative;overflow:hidden}
  #map-svg-wrap{
    position:absolute;
    left:50%;top:50%;
    transform:translate(-50%,-50%);
    width:780px;height:680px;
    opacity:.6;
    transition:opacity .8s;
  }
  #map-svg-wrap.active{opacity:.85}
  #map-svg{width:100%;height:100%}
  .lhr-fill{fill:rgba(0,212,255,0.04);transition:fill .6s}
  .lhr-fill.awake{fill:rgba(0,212,255,0.09)}
  .lhr-boundary{fill:none;stroke:rgba(0,212,255,0.28);stroke-width:.9;stroke-linejoin:round;filter:drop-shadow(0 0 4px rgba(0,212,255,.25))}
  .grid-line{stroke:rgba(0,212,255,0.07);stroke-width:.4}

  /* ── LOADING OVERLAY ── */
  #loading-overlay{
    position:absolute;inset:0;z-index:20;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1.5rem;
    opacity:0;pointer-events:none;
    transition:opacity .4s;
  }
  #loading-overlay.show{opacity:1;pointer-events:all}

  .rings{position:relative;width:56px;height:56px}
  .ring{position:absolute;inset:0;border-radius:50%;border:1px solid transparent}
  .ring-1{border-top-color:var(--accent);animation:spin 1s linear infinite}
  .ring-2{border-top-color:var(--violet);animation:spin 1.4s linear infinite reverse;inset:7px}
  .ring-3{border-top-color:var(--green);animation:spin 1.8s linear infinite;inset:14px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .loading-label{font-family:var(--mono);font-size:10px;color:var(--text-2);letter-spacing:.16em;text-transform:uppercase;text-align:center}
  .loading-sub{font-family:var(--mono);font-size:9px;color:var(--text-3);letter-spacing:.06em;text-align:center;opacity:.6}

  #progress-wrap{width:200px}
  #progress-track{height:1px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden}
  #progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));width:0%;transition:width .4s;box-shadow:0 0 5px rgba(0,212,255,.4)}
  #progress-label{font-family:var(--mono);font-size:8px;color:var(--text-3);margin-top:.4rem;letter-spacing:.08em;text-align:right}

  /* ── ERROR OVERLAY ── */
  #error-overlay{
    position:absolute;inset:0;z-index:20;
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
  }
  #error-overlay.show{display:flex}
  .err-box{
    background:rgba(244,63,94,.06);border:1px solid rgba(244,63,94,.2);
    border-radius:12px;padding:1.5rem 2rem;text-align:center;max-width:340px;
  }
  .err-icon{font-size:24px;margin-bottom:.5rem;display:block}
  .err-title{font-size:13px;font-weight:600;color:var(--red);margin-bottom:.375rem}
  .err-msg{font-family:var(--mono);font-size:10px;color:var(--text-3);line-height:1.7;letter-spacing:.03em}
  .btn-retry{
    margin-top:1rem;height:34px;padding:0 1rem;
    background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25);
    border-radius:var(--r);color:var(--red);font-family:var(--sans);font-size:12px;
    cursor:pointer;transition:all .15s;
  }
  .btn-retry:hover{background:rgba(244,63,94,.18)}

  /* ── SIDEBAR ── */
  #sidebar{
    width:320px;min-width:300px;height:100%;
    border-left:1px solid var(--border);
    background:var(--surface);
    backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
    display:flex;flex-direction:column;
    opacity:0;transform:translateX(20px);
    transition:opacity .6s .2s,transform .6s .2s cubic-bezier(.2,0,0,1);
  }
  #sidebar.show{opacity:1;transform:translateX(0)}
  .sb-topline{height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.35;flex-shrink:0}

  /* ── METRICS BAR ── */
  #metrics{padding:.875rem 1.125rem;border-bottom:1px solid var(--border);flex-shrink:0}
  .metrics-label{font-family:var(--mono);font-size:7.5px;color:var(--text-3);letter-spacing:.16em;text-transform:uppercase;margin-bottom:.625rem}
  .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem .75rem}
  .m-label{font-family:var(--mono);font-size:7.5px;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase}
  .m-val{font-family:var(--mono);font-size:14px;font-weight:500;margin-top:2px}
  .m-val.cyan{color:var(--accent)}
  .m-val.green{color:var(--green)}
  .m-val.amber{color:var(--amber)}
  .track{height:1.5px;background:rgba(255,255,255,.06);border-radius:1px;margin-top:.625rem;overflow:hidden}
  .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));width:0;transition:width 1.4s cubic-bezier(.4,0,.2,1);box-shadow:0 0 5px rgba(0,212,255,.35)}

  /* ── WEATHER BADGE ── */
  #weather-badge{
    display:inline-flex;align-items:center;gap:.35rem;
    margin-top:.5rem;
    font-family:var(--mono);font-size:9px;color:var(--text-3);
    letter-spacing:.08em;
    padding:.25rem .5rem;border-radius:4px;
    border:1px solid var(--border);background:rgba(255,255,255,.03);
  }
  #weather-icon{font-size:11px}

  /* ── TOP 3 CANDIDATES ── */
  #top3-bar{padding:.625rem 1.125rem;border-bottom:1px solid var(--border);flex-shrink:0}
  .top3-label{font-family:var(--mono);font-size:7.5px;color:var(--text-3);letter-spacing:.16em;text-transform:uppercase;margin-bottom:.5rem}
  .candidate{
    display:flex;align-items:center;justify-content:space-between;
    padding:.35rem .5rem;border-radius:5px;margin-bottom:.25rem;
    border:1px solid var(--border);background:rgba(255,255,255,.02);
    font-family:var(--mono);font-size:9px;
  }
  .candidate.winner{border-color:rgba(0,229,160,.25);background:rgba(0,229,160,.04)}
  .cand-rank{color:var(--text-3);margin-right:.4rem;flex-shrink:0}
  .cand-route{color:var(--text-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.02em}
  .cand-cost{color:var(--accent);flex-shrink:0;margin-left:.4rem}
  .candidate.winner .cand-cost{color:var(--green)}
  .cand-crown{color:var(--green);margin-left:.3rem;font-size:10px}

  /* ── STOP LIST ── */
  #sb-body{flex:1;overflow-y:auto;padding:.625rem}
  #sb-body::-webkit-scrollbar{width:2px}
  #sb-body::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:2px}
  .sb-section-label{font-family:var(--mono);font-size:7.5px;color:var(--text-3);letter-spacing:.16em;text-transform:uppercase;margin-bottom:.5rem;padding:.2rem 0}

  .r-ticket{
    background:rgba(255,255,255,.03);border:1px solid var(--border);
    border-radius:var(--r);margin-bottom:.35rem;overflow:hidden;
    cursor:pointer;transition:border-color .15s,box-shadow .15s;
  }
  .r-ticket:hover{border-color:rgba(0,212,255,.2);box-shadow:0 0 10px rgba(0,212,255,.05)}
  .r-head{padding:.55rem .625rem;display:flex;align-items:center;gap:.4rem}
  .r-order{
    font-family:var(--mono);font-size:9px;font-weight:500;
    color:#000;width:20px;height:20px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .r-name{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .r-deadline{font-family:var(--mono);font-size:8px;color:var(--amber);margin-right:.25rem;white-space:nowrap}
  .r-chev{font-size:9px;color:var(--text-3);transition:transform .2s;flex-shrink:0}
  .r-chev.open{transform:rotate(180deg)}
  .r-dirs{padding:0 .625rem .625rem;border-top:1px solid var(--border);display:none}
  .r-dirs.open{display:block}
  .dir-step{
    font-family:var(--mono);font-size:9.5px;color:var(--text-2);
    padding:.275rem 0;border-bottom:1px solid var(--border);
    display:flex;gap:.4rem;line-height:1.55;
  }
  .dir-step:last-child{border-bottom:none}
  .dir-n{font-size:8px;color:var(--text-3);flex-shrink:0;width:14px;padding-top:1px}

  .summary-card{
    padding:.625rem .75rem;
    background:rgba(0,229,160,.05);border:1px solid rgba(0,229,160,.12);
    border-radius:var(--r);margin-top:.375rem;
  }
  .sc-label{font-family:var(--mono);font-size:7.5px;color:var(--green);font-weight:500;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.35rem}
  .sc-vals{display:flex;gap:.75rem;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--green);font-weight:400}

  /* ── COORD BAR ── */
  #coord-bar{position:fixed;bottom:1.125rem;left:1.5rem;z-index:20;font-family:var(--mono);font-size:8px;color:var(--text-3);letter-spacing:.1em;background:rgba(12,15,22,.7);padding:.3rem .55rem;border-radius:5px;border:1px solid var(--border);backdrop-filter:blur(8px)}
  </style>
</head>

<div id="vbg">
  <video autoplay loop muted playsinline>
    <source src="https://res.cloudinary.com/dfonotyfb/video/upload/v1775585556/dds3_1_rqhg7x.mp4" type="video/mp4"/>
  </video>
</div>
<div class="noise"></div>

<div id="entry-veil"></div>

<!-- HEADER -->
<div id="hdr">
  <div id="logo">
    <div id="logo-dot"></div>
    <div>
      <div id="logo-text">AXIS</div>
      <div id="logo-sub">LHR · ROUTE RESULTS</div>
    </div>
  </div>
  <div id="hdr-center">
    <span id="route-label">Computing optimal path…</span>

  <div id="hdr-right">

</div>

        <div class="ring ring-3"></div>

        <div id="progress-track"><div id="progress-fill"></div></div>
        <div id="progress-label">0%</div>

    <div id="error-overlay">

        <div class="err-title">Optimization Failed</div>
        <div class="err-msg" id="err-text">Could not connect to the optimization server.</div>
        <button class="btn-retry" onclick="window.location.href='/'">← Back to Input</button>

<script>
// ── clock ─────────────────────────────────────────────────────────────────────
(function tick(){
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB',{hour12:false,timeZone:'Asia/Karachi'});
  setTimeout(tick,1000);
})();

// ── entry veil fade-out ───────────────────────────────────────────────────────
requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    document.getElementById('entry-veil').classList.add('gone');
  });
});

// ── constants ─────────────────────────────────────────────────────────────────
const GEO    = {minLon:74.00685,maxLon:74.65467,minLat:31.20059,maxLat:31.71342};
const SVG_W  = 640, SVG_H = 560, PAD = 35;
const COLORS = ['#00d4ff','#a78bfa','#00e5a0','#f59e0b','#f43f5e','#38bdf8','#fb923c','#34d399'];
const LOADING_MSGS = [
  'Running genetic algorithm…',
  'Evaluating population…',
  'Selecting elite routes…',
  'Crossing over chromosomes…',
  'Mutating candidate routes…',
  'Verifying with Google Maps…',
  'Converging on optimal path…',
];
const WEATHER_ICONS = {clear:'☀',rain:'🌧',fog:'🌫',haze:'🌁',sunny:'☀',cloudy:'☁',drizzle:'🌦'};

// ── geo helpers ───────────────────────────────────────────────────────────────
function geoToSvg(lon, lat){
  const x = PAD + (lon-GEO.minLon)/(GEO.maxLon-GEO.minLon)*(SVG_W-2*PAD);
  const y = SVG_H - PAD - (lat-GEO.minLat)/(GEO.maxLat-GEO.minLat)*(SVG_H-2*PAD);
  return [+x.toFixed(1), +y.toFixed(1)];
}

function estKm(arr){
  let d = 0;
  for(let i=0;i<arr.length-1;i++){
    const dlat = (arr[i+1].lat-arr[i].lat)*111;
    const dlon = (arr[i+1].lon-arr[i].lon)*111*Math.cos(arr[i].lat*Math.PI/180);
    d += Math.sqrt(dlat*dlat+dlon*dlon);
  }
  return d;
}

// ── progress animation ────────────────────────────────────────────────────────
let progressInterval, msgInterval, progress = 0;

function startProgress(){
  let mi = 0;
  msgInterval = setInterval(()=>{
    document.getElementById('loading-sub').textContent = LOADING_MSGS[mi++ % LOADING_MSGS.length];
  }, 500);
  progressInterval = setInterval(()=>{
    progress = Math.min(progress + Math.random()*3, 90);
    document.getElementById('progress-fill').style.width = progress+'%';
    document.getElementById('progress-label').textContent = Math.round(progress)+'%';
  }, 180);
}

function finishProgress(cb){
  clearInterval(progressInterval);
  clearInterval(msgInterval);
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = '100%';
  setTimeout(cb, 400);
}

// ── reveal sidebar ────────────────────────────────────────────────────────────
function revealSidebar(){
  document.getElementById('sidebar').classList.add('show');
}

// ── show error ────────────────────────────────────────────────────────────────
function showError(msg){
  clearInterval(progressInterval);
  clearInterval(msgInterval);
  document.getElementById('loading-overlay').classList.remove('show');
  document.getElementById('err-text').textContent = msg;
  document.getElementById('error-overlay').classList.add('show');
}

// ── smart label offset: nudge label away from map centre ─────────────────────
function labelOffset(sx, sy) {
  const cx = SVG_W / 2, cy = SVG_H / 2;
  const dx = sx - cx, dy = sy - cy;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  // push 18px outward from the marker dot, with a -14px vertical lift
  return [
    +(sx + (dx/len) * 18).toFixed(1),
    +(sy + (dy/len) * 18 - 14).toFixed(1)
  ];
}

// ── draw route on SVG map ─────────────────────────────────────────────────────
function drawRoute(ordered){
  const g  = document.getElementById('route-group');
  const lg = document.getElementById('labels-group');
  g.innerHTML  = '';
  lg.innerHTML = '';

  if (!ordered.length) return;

  const pts = ordered.map(s => geoToSvg(s.lon, s.lat));
  const d   = 'M' + pts.map(p => p.join(',')).join('L');

  // glow layer
  const glow = document.createElementNS('http://www.w3.org/2000/svg','path');
  glow.setAttribute('d', d);
  glow.setAttribute('fill', 'none');
  glow.setAttribute('stroke', 'rgba(0,212,255,0.18)');
  glow.setAttribute('stroke-width', '10');
  glow.setAttribute('stroke-linecap', 'round');
  glow.setAttribute('stroke-linejoin', 'round');
  g.appendChild(glow);

  // route line
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', d);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', '#00d4ff');
  path.setAttribute('stroke-width', '1.5');
  path.setAttribute('stroke-linecap', 'round');
  path.setAttribute('stroke-linejoin', 'round');
  path.setAttribute('stroke-dasharray', '6 4');
  path.style.opacity = '0';
  path.style.transition = 'opacity .8s';
  g.appendChild(path);
  setTimeout(() => path.style.opacity = '1', 80);

  // markers + name labels
  const mg = document.getElementById('markers-group');
  mg.innerHTML = '';

  ordered.forEach((s, i) => {
    const [sx, sy] = geoToSvg(s.lon, s.lat);
    const c = COLORS[i % COLORS.length];

    // — marker dot —
    const el = document.createElementNS('http://www.w3.org/2000/svg','g');
    el.innerHTML = `
      <circle cx="${sx}" cy="${sy}" r="11" fill="${c}" opacity=".12"/>
      <circle cx="${sx}" cy="${sy}" r="6" fill="${c}"/>
      <circle cx="${sx}" cy="${sy}" r="2.5" fill="rgba(8,10,15,.85)"/>
      <text x="${sx+9}" y="${sy+4}" font-family="IBM Plex Mono,monospace" font-size="8" fill="${c}" font-weight="700">${i+1}</text>`;
    mg.appendChild(el);

    // — name label (short: first segment before comma) —
    const shortName = (s.name || `Stop ${i+1}`).split(',')[0].trim();
    const [lx, ly] = labelOffset(sx, sy);

    // pill background then text, grouped and faded in
    const labelG = document.createElementNS('http://www.w3.org/2000/svg','g');
    labelG.style.opacity  = '0';
    labelG.style.transition = `opacity .5s ${0.15 + i * 0.06}s`;

    // approximate pill width: ~6.2px per char + 12px padding each side
    const pillW  = Math.round(shortName.length * 6.2 + 24);
    const pillH  = 16;
    const pillX  = lx - pillW / 2;
    const pillY  = ly - pillH / 2;

    labelG.innerHTML = `
      <rect
        x="${pillX}" y="${pillY}"
        width="${pillW}" height="${pillH}"
        rx="4"
        fill="rgba(8,10,15,0.72)"
        stroke="${c}"
        stroke-width="0.6"
        stroke-opacity="0.55"
      />
      <text
        x="${lx}" y="${ly}"
        font-family="IBM Plex Mono,monospace"
        font-size="8"
        font-weight="500"
        fill="${c}"
        text-anchor="middle"
        dominant-baseline="central"
      >${shortName}</text>`;

    lg.appendChild(labelG);
    // trigger fade-in after paint
    setTimeout(() => { labelG.style.opacity = '1'; }, 80 + i * 60);
  });

  document.getElementById('fill-path').classList.add('awake');
  document.getElementById('map-svg-wrap').classList.add('active');
}

// ── render results ────────────────────────────────────────────────────────────
function renderResults(data){
  const ordered = Array.isArray(data.route) ? data.route : [];
  const top3    = Array.isArray(data.top3)  ? data.top3  : [];
  const legs    = Array.isArray(data.legs)  ? data.legs  : [];

  if (!ordered.length) { showError('Route data is empty.'); return; }

  const routeLabel = ordered.map(s => (s.name || '?').split(',')[0]).join(' → ');
  document.getElementById('route-label').textContent = routeLabel;

  const km    = estKm(ordered);
  const score = Math.min(97, Math.round(68 + ordered.length * 2.5 + Math.random() * 6));
  const gmins = typeof data.google_mins === 'number' ? data.google_mins : 0;

  document.getElementById('m-dist').textContent  = km.toFixed(1) + ' km';
  document.getElementById('m-time').textContent  = '~' + Math.round(gmins) + ' min';
  document.getElementById('m-score').textContent = score + '%';
  document.getElementById('m-stops').textContent = ordered.length;

  setTimeout(() => { document.getElementById('eff-fill').style.width = score + '%'; }, 300);

  const wRaw  = (data.weather || '').toLowerCase().trim();
  const wIcon = WEATHER_ICONS[wRaw] || '◌';
  document.getElementById('weather-icon').textContent = wIcon;
  document.getElementById('weather-text').textContent =
    (data.weather || 'UNKNOWN').toUpperCase() + ' CONDITIONS';

  document.getElementById('top3-list').innerHTML = top3.map((c, i) => {
    const routeNames = Array.isArray(c.route)
      ? c.route.map(n => String(n).split(',')[0]).join(' → ')
      : '';
    return `
      <div class="candidate ${i === 0 ? 'winner' : ''}">
        <span class="cand-rank">${i === 0 ? '★' : i + 1}</span>
        <span class="cand-route">${routeNames}</span>
        <span class="cand-cost">${Number(c.ga_cost).toFixed(1)} min</span>
        ${i === 0 ? '<span class="cand-crown">✓</span>' : ''}
      </div>`;
  }).join('');

  const legHTML = legs.map((leg, i) => {
    const legFrom = String(leg['from'] || leg['from_'] || '');
    const legTo   = String(leg['to']   || '');
    const steps   = Array.isArray(leg.steps) ? leg.steps : [];

    return `
      <div class="r-ticket">
        <div class="r-head" onclick="toggleDir(this)">
          <div class="r-order" style="background:${COLORS[i % COLORS.length]};color:#000">${i + 1}</div>
          <div class="r-name">${legFrom.split(',')[0]} → ${legTo.split(',')[0]}</div>
          <div class="r-deadline">${leg.distance || ''} · ${leg.duration || ''}</div>
          <div class="r-chev">▾</div>
        </div>
        <div class="r-dirs">
          ${steps.length
            ? steps.map((step, j) => `
                <div class="dir-step">
                  <span class="dir-n">${j + 1}</span>
                  <span>${step}</span>
                </div>`).join('')
            : '<div class="dir-step"><span class="dir-n">—</span><span>No steps available</span></div>'
          }
        </div>
      </div>`;
  }).join('');

  document.getElementById('route-list').innerHTML = legHTML + `
    <div class="summary-card">
      <div class="sc-label">Route Summary</div>
      <div class="sc-vals">
        <span>${km.toFixed(1)} km</span>
        <span>~${Math.round(gmins)} min</span>
        <span>${ordered.length} stops</span>
        <span>${score}% eff.</span>
        <span>Score ${data.final_score != null ? Number(data.final_score).toFixed(1) : 'N/A'}</span>
      </div>
    </div>`;

  drawRoute(ordered);
}

// ── toggle directions accordion ───────────────────────────────────────────────
function toggleDir(headEl) {
  const ticket = headEl.closest('.r-ticket');
  ticket.querySelector('.r-dirs').classList.toggle('open');
  ticket.querySelector('.r-chev').classList.toggle('open');
}

// ── bootstrap ─────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  let data;
  try {
    const raw = sessionStorage.getItem('optimizeResponse');
    if (!raw) { showError('No route data found in session. Please go back and run a new route.'); return; }
    data = JSON.parse(raw);
  } catch(e) {
    showError('Failed to parse route data: ' + e.message);
    return;
  }

  startProgress();

  setTimeout(() => {
    finishProgress(() => {
      document.getElementById('loading-overlay').classList.remove('show');
      try {
        renderResults(data);
        revealSidebar();
      } catch(e) {
        console.error('renderResults threw:', e);
        showError('Render error: ' + e.message);
      }
    });
  }, 600);
});
</script>
</body>
</html>
